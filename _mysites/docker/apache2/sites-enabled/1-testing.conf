<VirtualHost *:8080>
    ServerAdmin webmaster@testing.test
    DocumentRoot /Sites/testing
    ServerName testing.test
    ServerAlias testing.mysites testing.local

    #kindle spark creates a rebuild.html if it exists process not finished, so redirect
    RewriteEngine on
    RewriteCond /Sites/rebuild.html -f
    RewriteCond %{REQUEST_URI} !^/rebuild.html
    RewriteRule  ^(.*)  http://localhost:8080/rebuild.html [L]

    # Proxy .php requests to port 9000 of the php-fpm container
    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://${FPM_SOCK}:9000/Sites/testing/$1
 
    <Directory /Sites/testing>
       Options Indexes FollowSymLinks
       AllowOverride All
       Require all granted
    </Directory>

    ErrorLog  /var/log/apache2/testing.test_error.log
    CustomLog /var/log/apache2/testing.test_access.log combined
</VirtualHost>
